name: Release (Windows)

# Acionado por tag v*. Constrói a app Windows com Velopack e publica os
# artefatos (.nupkg + Setup.exe + RELEASES) no GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão (ex: 1.0.0). Se vazio, usa o tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version & channel
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $input = "${{ github.event.inputs.version }}"
          if ($input) { $v = $input }
          elseif ($tag -like "v*") { $v = $tag.Substring(1) }
          else { $v = "0.0.1" }

          # Canal derivado do sufixo SemVer:
          #   1.0.0          -> stable
          #   1.0.0-beta.1   -> beta
          #   1.0.0-alpha.3  -> alpha
          if ($v -match '-') {
            $channel = ($v -split '-', 2)[1] -replace '\..*$',''
            $prerelease = 'true'
          } else {
            $channel = 'stable'
            $prerelease = 'false'
          }

          echo "version=$v" >> $env:GITHUB_OUTPUT
          echo "channel=$channel" >> $env:GITHUB_OUTPUT
          echo "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          echo "Building version $v on channel $channel (prerelease=$prerelease)"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Install Velopack CLI (vpk)
        run: dotnet tool install -g vpk

      - name: Restore
        run: dotnet restore yugiho.sln

      - name: Publish yugiho-tools
        run: >
          dotnet publish yugiho-tools/yugiho-tools.csproj
          -c Release -r win-x64 --self-contained
          -p:WindowsPackageType=None
          -p:Version=${{ steps.ver.outputs.version }}
          -o publish/tools

      - name: Pack yugiho-tools (Velopack)
        run: >
          vpk pack
          --packId YugihoTools
          --packTitle "Yugiho Tools"
          --packAuthors "jonnathanvb"
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish/tools
          --mainExe yugiho-tools.exe
          --channel ${{ steps.ver.outputs.channel }}
          --outputDir releases/tools

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: releases
          path: releases/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          prerelease: ${{ steps.ver.outputs.prerelease }}
          generate_release_notes: true
          files: |
            releases/tools/*
